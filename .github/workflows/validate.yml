name: Validate

on:
  pull_request:
    branches: [develop]

concurrency:
  group: validate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  detect-changed-modules:
    name: Detect Changed Modules
    runs-on: ubuntu-latest

    outputs:
      modules_json: ${{ steps.find-modules.outputs.modules_json }}
      modules_found: ${{ steps.find-modules.outputs.modules_found }}

    steps:
      - uses: actions/checkout@v4

      - name: Detect changed files
        id: changed-files
        uses: tj-actions/changed-files@v45
        with:
          files: modules/**

      - name: Find module roots
        id: find-modules
        run: |
          if [ "${{ steps.changed-files.outputs.any_changed }}" != "true" ]; then
            echo "modules_found=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Changed files:"
          echo "${{ steps.changed-files.outputs.all_changed_files }}"

          find_module_root() {
            local dir=$(dirname "$1")
            while [ "$dir" != "." ] && [ "$dir" != "/" ]; do
              [ -f "$dir/module.yaml" ] && echo "$dir" && return 0
              [ "$dir" = "modules" ] && return 1
              dir=$(dirname "$dir")
            done
            return 1
          }

          module_dirs=""
          orphaned=""
          for file in ${{ steps.changed-files.outputs.all_changed_files }}; do
            if root=$(find_module_root "$file"); then
              module_dirs="$module_dirs$root"$'\n'
            else
              orphaned="$orphaned$file"$'\n'
            fi
          done

          if [ -n "$orphaned" ]; then
            echo "::error::Files not part of any module (missing module.yaml):"
            echo "$orphaned" | sed '/^$/d' | while read -r f; do echo "  - $f"; done
            exit 1
          fi

          unique=$(echo "$module_dirs" | sort -u | sed '/^$/d')
          if [ -z "$unique" ]; then
            echo "modules_found=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Changed modules:"
          echo "$unique"

          modules_json=$(echo "$unique" | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "modules_json=$modules_json" >> $GITHUB_OUTPUT
          echo "modules_found=true" >> $GITHUB_OUTPUT

  validate:
    name: Validate
    runs-on: ubuntu-latest
    needs: detect-changed-modules
    if: needs.detect-changed-modules.outputs.modules_found == 'true'

    strategy:
      matrix:
        module_path: ${{ fromJson(needs.detect-changed-modules.outputs.modules_json) }}
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Structure check
        run: |
          MODULE="${{ matrix.module_path }}"
          [ -f "$MODULE/module.yaml" ] || { echo "::error::module.yaml missing in $MODULE"; exit 1; }
          [ -f "$MODULE/main.tf" ]     || { echo "::error::main.tf missing in $MODULE"; exit 1; }
          echo "Structure valid: $MODULE"

      - name: Validate module.yaml fields
        run: |
          MODULE="${{ matrix.module_path }}"
          YAML="$MODULE/module.yaml"
          errors=0

          for field in id name system version; do
            value=$(grep "^  $field:" "$YAML" | head -1 | sed 's/^[^:]*: *//' | tr -d '"' | tr -d "'")
            if [ -z "$value" ]; then
              echo "::error::Required field '$field' missing in $YAML"
              errors=$((errors + 1))
            else
              echo "$field: $value"
            fi
          done

          [ $errors -gt 0 ] && exit 1
          echo "module.yaml fields valid"

      - name: Module ID uniqueness
        run: |
          MODULE="${{ matrix.module_path }}"
          CURRENT_ID=$(grep "^  id:" "$MODULE/module.yaml" | head -1 | sed 's/^[^:]*: *//' | tr -d '"')
          [ -z "$CURRENT_ID" ] && { echo "::error::No 'id' field in module.yaml"; exit 1; }

          echo "Module id: $CURRENT_ID"

          duplicates=""
          while IFS= read -r f; do
            dir=$(dirname "$f")
            [ "$dir" = "$MODULE" ] && continue
            fid=$(grep "^  id:" "$f" | head -1 | sed 's/^[^:]*: *//' | tr -d '"')
            [ "$fid" = "$CURRENT_ID" ] && duplicates="$duplicates$dir"$'\n'
          done < <(find modules -name "module.yaml" -type f)

          if [ -n "$duplicates" ]; then
            echo "::error::Duplicate module id '$CURRENT_ID' found in:"
            echo "$duplicates" | sed '/^$/d' | while read -r d; do echo "  - $d"; done
            exit 1
          fi
          echo "Module id is unique"

      - name: Version bump check
        run: |
          MODULE="${{ matrix.module_path }}"

          # If no .tf files changed in this module, skip — metadata-only edits don't need a version bump
          TF_CHANGES=$(git diff --name-only "origin/${{ github.event.pull_request.base.ref }}"...HEAD -- "$MODULE"/*.tf "$MODULE"/**/*.tf 2>/dev/null || true)
          if [ -z "$TF_CHANGES" ]; then
            echo "Metadata-only change — skipping version bump check"
            exit 0
          fi

          CURRENT=$(grep "^  version:" "$MODULE/module.yaml" | head -1 | sed 's/^[^:]*: *//' | tr -d '"')
          [ -z "$CURRENT" ] && { echo "::error::No 'version' field in module.yaml"; exit 1; }

          BASE=$(git show origin/${{ github.event.pull_request.base.ref }}:"$MODULE/module.yaml" 2>/dev/null \
            | grep "^  version:" | head -1 | sed 's/^[^:]*: *//' | tr -d '"' || echo "")

          if [ -z "$BASE" ]; then
            echo "New module — skipping version bump check"
          elif [ "$CURRENT" = "$BASE" ]; then
            echo "::error::Version not bumped ($CURRENT). Update version in module.yaml."
            exit 1
          else
            echo "Version bumped: $BASE -> $CURRENT"
          fi

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.6"

      - name: Terraform format check
        run: terraform fmt -check -recursive "${{ matrix.module_path }}"

      - name: Terraform validate
        run: |
          cd "${{ matrix.module_path }}"
          terraform init -backend=false
          terraform validate

      - name: Install Lace CLI
        run: |
          wget -q https://releases.lace.cloud/lace-cli-linux-amd64 -O lace
          chmod +x lace && sudo mv lace /usr/local/bin/lace

      - name: Parse module
        run: lace module parse --path "${{ matrix.module_path }}"

  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [detect-changed-modules, validate]
    if: always()

    steps:
      - name: Report
        run: |
          echo "# Module Validation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.detect-changed-modules.outputs.modules_found }}" != "true" ]; then
            echo "No module changes detected." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          echo "## Modules" >> $GITHUB_STEP_SUMMARY
          echo '${{ needs.detect-changed-modules.outputs.modules_json }}' | jq -r '.[] | "- `" + . + "`"' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.validate.result }}" = "success" ]; then
            echo "**Result:** All modules passed validation." >> $GITHUB_STEP_SUMMARY
          else
            echo "**Result:** Validation failed." >> $GITHUB_STEP_SUMMARY
          fi
