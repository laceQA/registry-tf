module:
  id: aws/iam/policy_attachment
  name: iam-policy-attachment
  system: aws
  version: 1.0.0
  description: "AWS IAM role policy attachment for connecting policies to roles"
  categories:
    - iam
    - security
    - permissions
  authors:
    - name: "Lace Team"
      email: "team@lace.cloud"
  registry_visibility: public
  example: |
    module "attachment" {
      source = "git::https://github.com/lace-cloud/registry-tf.git//modules/aws/iam/policy_attachment?ref=v1.0.0"

      role_name  = module.iam_role.role_name
      policy_arn = module.iam_policy.policy_arn
    }
