module:
  id: aws/alb/listener_rule
  name: alb-listener-rule
  system: aws
  version: 1.0.0
  description: "AWS ALB listener rule with host/path conditions and forward, redirect, or fixed-response actions"
  categories:
    - networking
    - load-balancing
    - alb
  authors:
    - name: "Lace Team"
      email: "team@lace.cloud"
  registry_visibility: public
  example: |
    module "listener_rule" {
      source = "git::https://github.com/lace-cloud/registry-tf.git//modules/aws/alb/listener_rule?ref=v1.0.0"

      listener_arn     = module.listener.arn
      priority         = 100
      path_patterns    = ["/api/*"]
      action_type      = "forward"
      target_group_arn = module.target_group.arn

      tags = {
        Environment = "production"
      }
    }
