module:
  id: aws/sagemaker/endpoint
  name: sagemaker-endpoint
  system: aws
  version: 1.0.9
  description: "Deploy a SageMaker endpoint for ML inference using HuggingFace model"

  categories:
    - machine-learning
    - inference

  authors:
    - name: "Sravani"
      email: "testlaceapp@gmail.com"

  example: |
    module "sagemaker_endpoint" {
      source  = "lace://testlaceapp/aws/sagemaker_endpoint"
      version = "1.0.8"

      endpoint_name = "test-endpoint"
      model_name    = "test-model"
      instance_type = "ml.t2.medium"
    }